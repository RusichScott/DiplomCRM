<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт - Miestilo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../login/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Вход в аккаунт</h1>
            <p>Войдите, чтобы получить доступ ко всем функциям</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <a href="../index/index.html" class="back-to-home">
                <i class="fas fa-arrow-left"></i> Вернуться на главную
            </a>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                <div class="error-message" id="emailError">Пожалуйста, введите корректный email</div>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Введите ваш пароль" required minlength="6">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-message" id="passwordError">Пароль должен содержать не менее 6 символов</div>
            </div>
            
            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    Запомнить меня
                </label>
                <a href="#" class="forgot-password" id="forgotPasswordLink">Забыли пароль?</a>
            </div>
            
            <button type="submit" class="btn-login">Войти</button>
            
            <div class="divider">
                <span>Или войдите через</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-btn vk">
                    <i class="fab fa-vk"></i> ВКонтакте
                </button>
                <button type="button" class="social-btn google">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="social-btn yandex">
                    <i class="fab fa-yandex"></i> Яндекс
                </button>
            </div>
            
            <div class="register-link-container">
                Нет аккаунта?
                <a href="../registration/registration.html" class="register-link">Зарегистрироваться</a>
            </div>
        </form>
    </div>

    <script src="logScript.js"></script>
</body>
</html>
