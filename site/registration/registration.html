<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Miestilo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="registration.css">
    
</head>
<body>
    <div class="registration-container">
        <div class="registration-header">
            <h1>Регистрация аккаунта</h1>
            <p>Создайте аккаунт для доступа ко всем функциям</p>
        </div>
        
        <form class="registration-form" id="registrationForm">
            <a href="../index/index.html" class="back-to-home">
                <i class="fas fa-arrow-left"></i> Вернуться на главную
            </a>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Имя *</label>
                    <input type="text" id="firstName" placeholder="Ваше имя" required>
                </div>
                
                <div class="form-group">
                    <label for="lastName">Фамилия *</label>
                    <input type="text" id="lastName" placeholder="Ваша фамилия" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="regEmail">Email *</label>
                <input type="email" id="regEmail" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" placeholder="+7 (XXX) XXX-XX-XX">
            </div>
            
            <div class="form-group">
                <label for="regPassword">Пароль *</label>
                <input type="password" id="regPassword" placeholder="Не менее 6 символов" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Подтверждение пароля *</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
            </div>
            
            <button type="submit" class="btn-register">Зарегистрироваться</button>
            
            <div class="login-link">
                Уже есть аккаунт? <a href="../login/login.html">Войти</a>
            </div>
        </form>
    </div>

    <!-- Custom Modal -->
    <div class="custom-modal-overlay" id="customModal">
        <div class="custom-modal">
            <div class="custom-modal-header" id="modalHeader">
                <i id="modalIcon"></i>
                <span id="modalTitle"></span>
            </div>
            <p class="custom-modal-message" id="modalMessage"></p>
            <button class="custom-modal-btn" id="modalBtn">OK</button>
        </div>
    </div>

    <script src="regScript.js"></script>
</body>
</html>
